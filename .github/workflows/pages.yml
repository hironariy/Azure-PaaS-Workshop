# Authoritative build/deploy for the learner portal (materials/docs).
# To preview Pages content locally before pushing, run:
#   ./scripts/preview-pages.sh        # serves http://localhost:4000
#   ./scripts/preview-pages.sh stop   # stops the local preview
name: Deploy learner portal

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "materials/docs/**"
      - "assets/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build learner portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare Pages source
        run: |
          mkdir -p ./_pages_src
          cp -R ./materials/docs/. ./_pages_src/
          if [ -d ./assets ]; then
            mkdir -p ./_pages_src/assets
            cp -R ./assets/. ./_pages_src/assets/
          fi

      - name: Build Markdown site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./_pages_src
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy learner portal
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
